services:
  db:
    image: postgres:16
    container_name: prototipo_dayc_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-prototipo_dayc}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5434:5432"
    volumes:
      - prototipo_dayc_data:/var/lib/postgresql/data

volumes:
  prototipo_dayc_data: